<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rutas migratorias hacia España</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-o9N1j6kG8G7b3p7Z9E2JrZ9x6d1bY2u1x4f3g1u5rJU="
    crossorigin=""
  />

  <!-- Estilos del scrollytelling -->
  <link rel="stylesheet" href="scroll.css" />

  <!-- Preferencias (opcional) -->
  <meta name="color-scheme" content="dark light" />
</head>

<body>
  <!-- Mapa -->
  <div id="map"></div>

  <!-- Overlay narrativo -->
  <aside id="overlay" class="overlay overlay-dark">
    <header class="brand">
      <h1>Rutas migratorias hacia España</h1>
      <p>Desplázate o usa los botones para avanzar.</p>
    </header>

    <div class="nav-buttons">
      <button id="prevBtn" type="button">← Anterior</button>
      <button id="nextBtn" type="button">Siguiente →</button>
    </div>

    <div id="steps" class="steps"></div>

    <footer class="footnote">Fuentes disponibles por capítulo.</footer>
  </aside>

  <!-- ========= SCRIPTS (orden y defer) ========= -->

  <!-- Leaflet -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
    defer
  ></script>

  <!-- PolylineDecorator (flechas) -->
  <script
    src="https://unpkg.com/leaflet.polylinedecorator/dist/leaflet.polylineDecorator.min.js"
    defer
  ></script>

  <!-- Snake animation -->
  <script
    src="https://unpkg.com/leaflet-polyline-snake-anim/L.Polyline.SnakeAnim.js"
    defer
  ></script>

  <!-- Scrollama -->
  <script
    src="https://unpkg.com/scrollama@3.2.0/build/scrollama.min.js"
    defer
  ></script>

  <!-- Tu configuración (GeoJSON + capítulos) -->
  <script src="config.js" defer></script>

  <!-- Lógica del StoryMap (usa config.js) -->
  <script src="story.js" defer></script>

  <noscript>
    <p style="position:fixed;top:0;left:0;width:100%;padding:12px;background:#111;color:#fff;z-index:10000;">
      Este sitio necesita JavaScript para funcionar.
    </p>
  </noscript>
</body>
</html>
``
