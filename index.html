<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StoryMap – Rutas Migratorias hacia España</title>
  
  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <!-- Estilos propios -->
  <style>
    :root {
      --panel-w: 40vw;
      --accent: #d10000;
      --bg: #fafafa;
      --text: #1f2937;
      --muted: #6b7280;
    }

    html, body { height: 100%; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, 'Helvetica Neue', Arial, 'Noto Sans', 'Apple Color Emoji', 'Segoe UI Emoji'; color: var(--text); background: var(--bg); }

    #map { position: fixed; top: 0; bottom: 0; right: 0; left: var(--panel-w); }

    #story {
      position: fixed; top: 0; bottom: 0; left: 0; width: var(--panel-w);
      overflow-y: auto; background: #ffffff; border-right: 1px solid #e5e7eb;
    }

    .story-inner { padding: 24px; }

    .header { padding: 8px 0 16px; position: sticky; top: 0; background: #fff; z-index: 2; border-bottom: 1px solid #f3f4f6; }
    .header h1 { font-size: 1.25rem; margin: 0 0 4px; }
    .header p { margin: 0; color: var(--muted); }

    .chapter { padding: 28px 0; border-bottom: 1px solid #f3f4f6; min-height: 90vh; scroll-margin-top: 12px; }
    .chapter h2 { margin: 0 0 8px; font-size: 1.1rem; }
    .chapter .meta { font-size: 0.9rem; color: var(--muted); margin-bottom: 10px; }
    .chapter img { width: 100%; height: auto; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,.08); margin: 10px 0 12px; object-fit: cover; }
    .chapter p { line-height: 1.45; }

    .chapter.active { background: #fff7f7; }
    .chapter.active h2 { color: var(--accent); }

    .legend {
      position: absolute; right: 12px; bottom: 12px; z-index: 500;
      background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px 12px; font-size: 12px; color: #111827;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
    }
    .legend .row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
    .swatch { width: 14px; height: 14px; border-radius: 4px; display: inline-block; }

    @media (max-width: 900px) {
      :root { --panel-w: 100vw; }
      #map { position: relative; width: 100vw; height: 50vh; left: 0; }
      #story { position: relative; width: 100vw; height: auto; border-right: none; }
      .chapter { min-height: auto; }
      .legend { position: fixed; right: 12px; bottom: 12px; }
    }
  </style>
</head>
<body>

  <div id="story">
    <div class="story-inner">
      <div class="header">
        <h1>Rutas migratorias hacia España</h1>
        <p>Explora las rutas atlánticas y mediterráneas. Desplázate para avanzar.</p>
      </div>
      <div id="chapters"></div>
    </div>
  </div>

  <div id="map"></div>

  <div class="legend" id="legend">
    <div><strong>Peligrosidad (base)</strong></div>
    <div class="row"><span class="swatch" style="background:#8b0000"></span>Extrema</div>
    <div class="row"><span class="swatch" style="background:#e34a33"></span>Muy alta</div>
    <div class="row"><span class="swatch" style="background:#fdbb84"></span>Alta</div>
  </div>

  <!-- Config (GeoJSON + capítulos) -->
  <script src="config.js"></script>

  <script>
    // -------------------------
    // Inicializar mapa
    // -------------------------
    const map = L.map('map', {
      center: [27, -15],
      zoom: 4,
      scrollWheelZoom: true
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 12,
      attribution: '© OpenStreetMap'
    }).addTo(map);

    // Colores por peligrosidad (base, atenuado)
    const colorByRisk = (p) => {
      if (!p) return '#999999';
      const val = String(p).toLowerCase();
      if (val.includes('extrema')) return '#8b0000';
      if (val.includes('muy alta')) return '#e34a33';
      if (val.includes('alta')) return '#fdbb84';
      return '#9ca3af';
    };

    // Capa base (todas las rutas)
    const baseRoutes = L.geoJSON(RUTAS_GEOJSON, {
      style: (feat) => ({
        color: colorByRisk(feat.properties?.peligrosidad),
        weight: 3,
        opacity: 0.45
      }),
      onEachFeature: (feature, layer) => {
        const p = feature.properties || {};
        layer.bindTooltip(`${p.nombre || ''}`);
      }
    }).addTo(map);

    // Capa resaltada del capítulo activo
    let highlightLayer = L.geoJSON(null, {
      style: {
        color: '#d10000',
        weight: 6,
        opacity: 0.95
      }
    }).addTo(map);

    // Utilidades
    function getFeatureByCodigo(codigo) {
      return RUTAS_GEOJSON.features.find(f => f.properties && f.properties.codigo === codigo);
    }

    function featureBounds(feature) {
      const layer = L.geoJSON(feature);
      const b = layer.getBounds();
      return b;
    }

    function activateChapter(chapter) {
      const feat = getFeatureByCodigo(chapter.codigo);
      if (!feat) return;
      // Actualiza capa resaltada
      highlightLayer.clearLayers();
      highlightLayer.addData(feat);
      highlightLayer.bringToFront();
      // Ajusta vista al tramo
      try {
        const b = featureBounds(feat);
        map.flyToBounds(b, { padding: [40, 40], duration: 1.6 });
      } catch (e) {
        if (chapter.location && chapter.location.center) {
          map.flyTo(chapter.location.center, chapter.location.zoom || 6, { duration: 1.6 });
        }
      }
    }

    // -------------------------
    // Construcción del scrollytelling
    // -------------------------
    const chaptersContainer = document.getElementById('chapters');

    // Crea DOM de capítulos a partir de config + GeoJSON
    config.chapters.forEach((ch, idx) => {
      const feat = getFeatureByCodigo(ch.codigo) || { properties: {} };
      const p = feat.properties || {};

      const section = document.createElement('section');
      section.className = 'chapter';
      section.id = `chapter-${idx}`;

      const title = document.createElement('h2');
      title.textContent = ch.title || p.nombre || ch.codigo;

      const meta = document.createElement('div');
      meta.className = 'meta';
      const dist = (typeof p.distancia_km_aprox !== 'undefined') ? `${p.distancia_km_aprox} km aprox.` : '';
      const freq = p.frecuencia_anual_aprox ? ` · Frecuencia: ${p.frecuencia_anual_aprox}` : '';
      const risk = p.peligrosidad ? `Peligrosidad: ${p.peligrosidad}` : '';
      meta.textContent = [risk, dist, freq].filter(Boolean).join(' · ');

      const img = document.createElement('img');
      img.loading = 'lazy';
      img.decoding = 'async';
      img.src = ch.image?.src || ch.image || '';
      img.alt = ch.image?.alt || `Imagen del capítulo: ${title.textContent}`;
      if (!img.src) img.style.display = 'none';

      const para = document.createElement('p');
      para.textContent = ch.text || p.descripcion || '';

      // Fuentes, si existen
      if (Array.isArray(p.fuentes) && p.fuentes.length) {
        const sources = document.createElement('p');
        sources.style.fontSize = '0.85rem';
        sources.style.color = '#6b7280';
        sources.textContent = `Fuentes: ${p.fuentes.join(', ')}`;
        section.appendChild(sources);
      }

      section.appendChild(title);
      section.appendChild(meta);
      section.appendChild(img);
      section.appendChild(para);

      chaptersContainer.appendChild(section);
    });

    // IntersectionObserver para activar capítulos al hacer scroll
    const sections = Array.from(document.querySelectorAll('.chapter'));
    let activeIndex = -1;

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting && entry.intersectionRatio > 0.55) {
          const idx = sections.indexOf(entry.target);
          if (idx !== activeIndex) {
            if (activeIndex >= 0) sections[activeIndex].classList.remove('active');
            activeIndex = idx;
            sections[activeIndex].classList.add('active');
            activateChapter(config.chapters[activeIndex]);
          }
        }
      });
    }, { threshold: [0, 0.25, 0.55, 0.75, 1] });

    sections.forEach(s => observer.observe(s));

    // Activa el primer capítulo al cargar
    if (config.chapters && config.chapters.length) {
      sections[0].classList.add('active');
      activateChapter(config.chapters[0]);
    }
  </script>
</body>
</html>
