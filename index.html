<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rutas migratorias hacia España</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Estilos del scrollytelling -->
  <link rel="stylesheet" href="https://valfuster-hash.github.io/Rutas-migratorias/scroll.css?v=1" />

  <meta name="color-scheme" content="dark light" />
</head>

<body>
  <!-- Mapa -->
  <div id="map"></div>

  <!-- Overlay narrativo -->
  <aside id="overlay" class="overlay overlay-dark">
    <header class="brand">
      <h1>Rutas migratorias hacia España</h1>
      <p>Desplázate o usa los botones para avanzar.</p>
    </header>

    <div class="nav-buttons">
      <button id="prevBtn" type="button">← Anterior</button>
      <button id="nextBtn" type="button">Siguiente →</button>
    </div>

    <div id="steps" class="steps"></div>

    <footer class="footnote">Fuentes disponibles por capítulo.</footer>
  </aside>

  <!-- ============= SCRIPTS (orden correcto) ============= -->

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>

  <!-- PolylineDecorator (flechas) -->
  <script src="https://unpkg.com/leaflet.polylinedecorator/dist/leaflet.polylineDecorator.min.js" defer></script>

  <!-- Snake animation -->
  <script src="https://unpkg.com/leaflet-polyline-snake-anim/L.Polyline.SnakeAnim.js" defer></script>

  <!-- Scrollama -->
  <script src="https://unpkg.com/scrollama@3.2.0/build/scrollama.min.js" defer></script>

  <!-- Tu configuración (GeoJSON + capítulos) -->
  <script src="https://valfuster-hash.github.io/Rutas-migratorias/config.js?v=1" defer></script>

  <!-- Lógica del StoryMap (usa config.js) -->
  <script src="https://valfuster-hash.github.io/Rutas-migratorias/story.js?v=1" defer></script>

  <noscript>
    <p style="position:fixed;top:0;left:0;width:100%;padding:12px;background:#111;color:#fff;z-index:10000;">
      Este sitio necesita JavaScript para funcionar.
    </p>
  </noscript>
</body>
</html>
