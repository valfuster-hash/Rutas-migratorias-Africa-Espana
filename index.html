<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StoryMap – Rutas Migratorias hacia España (Fullscreen)</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- PolylineDecorator CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.polylinedecorator/dist/leaflet.polylineDecorator.css" />

  <!-- Styles for scrollytelling -->
  <link rel="stylesheet" href="scroll.css" />
</head>

<body>
  <div id="map"></div>

  <aside id="overlay" class="overlay overlay-dark">
    <header class="brand">
      <h1>Rutas migratorias hacia España</h1>
      <p>Desplázate o usa los botones para avanzar.</p>
    </header>

    <div class="nav-buttons">
      <button id="prevBtn">← Anterior</button>
      <button id="nextBtn">Siguiente →</button>
    </div>

    <div id="steps" class="steps"></div>

    <footer class="footnote">Fuentes disponibles por capítulo.</footer>
  </aside>

  <!-- Polyfills -->
  <script src="https://polyfill.io/v3/polyfill.min.js?features=IntersectionObserver"></script>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- PolylineDecorator JS -->
  <script src="https://unpkg.com/leaflet.polylinedecorator/dist/leaflet.polylineDecorator.min.js"></script>

  <!-- Scrollama -->
  <script src="https://unpkg.com/scrollama@3.2.0/build/scrollama.min.js"></script>

  <!-- Config -->
  <script src="config.js"></script>

  <!-- Story Logic -->
  <script src="story.js"></script>
</body>
</html>
